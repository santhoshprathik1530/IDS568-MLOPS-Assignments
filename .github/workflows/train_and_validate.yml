name: Train and Validate Model

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  train-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
      MLFLOW_EXPERIMENT_NAME: milestone3-ci
      MLFLOW_MODEL_NAME: milestone3-iris-model

    defaults:
      run:
        working-directory: Milestone_3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Milestone_3/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run training
        run: |
          python train.py \
            --experiment-name "$MLFLOW_EXPERIMENT_NAME" \
            --tracking-uri "$MLFLOW_TRACKING_URI" \
            --model-name "$MLFLOW_MODEL_NAME" \
            --data-version "ci_${{ github.sha }}" \
            --n-estimators 120 \
            --max-depth 6

      - name: Run quality gate
        run: |
          python model_validation.py \
            --min-accuracy 0.90 \
            --min-f1 0.90

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: milestone3-ci-artifacts
          path: |
            Milestone_3/outputs/
            Milestone_3/artifacts/
            Milestone_3/mlruns/
            Milestone_3/mlflow.db
